server {
    listen 80;
    listen [::]:80;
    server_name niuma.ru www.niuma.ru;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name niuma.ru www.niuma.ru;

    root /srv/www/niuma.ru/current;
    index index.html;

    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    ssl_certificate /etc/nginx/certs/niuma.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/niuma.ru/privkey.pem;

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location ~* \.mp4$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
